name: Build and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment inputs
        run: |
          test -f index.html
          test -f assets/css/theme.css
          test -f assets/js/theme.js
          test -f assets/vendor/bootstrap/css/bootstrap.min.css
          test -f assets/vendor/bootstrap/js/bootstrap.bundle.min.js
          test -f assets/vendor/gsap/gsap.min.js
          test -f assets/vendor/gsap/ScrollTrigger.min.js

      - name: Build static Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
